<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Astral Forge • Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0b0b0d; --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.72); --border:rgba(255,255,255,.12); --panel:rgba(0,0,0,.35); --gold:#b99054; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
  nav{ position:fixed; top:0; left:0; right:0; z-index:1000; backdrop-filter:blur(12px); background:rgba(0,0,0,.65); border-bottom:1px solid var(--border); }
  .nav-inner{ padding:14px 40px; display:flex; align-items:center; justify-content:space-between; gap:18px; }
  .brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--text); white-space:nowrap; }
  .brand img{ height:38px; }
  .brand-text{ font-family:"Cinzel",serif; font-weight:600; letter-spacing:.12em; font-size:13px; text-transform:uppercase; }
  .nav-links{ display:flex; gap:18px; align-items:center; }
  .nav-links a{ text-decoration:none; color:rgba(255,255,255,.82); font-size:14px; padding:8px 12px; border-radius:10px; transition:.2s; }
  .nav-links a:hover{ color:rgba(255,255,255,.96); background:rgba(255,255,255,.06); }
  .nav-links a.cta{ border:1px solid rgba(185,144,84,.55); background:linear-gradient(135deg, rgba(185,144,84,.18), rgba(0,0,0,.12)); }
  main{ padding-top:86px; max-width:1100px; margin:0 auto; padding-left:20px; padding-right:20px; padding-bottom:70px; }
  .hero{ border:1px solid var(--border); border-radius:18px; overflow:hidden; background:var(--panel); box-shadow:0 18px 48px rgba(0,0,0,.35); }
  .banner{ height:280px; background:radial-gradient(circle at 25% 20%, rgba(255,255,255,.08), rgba(0,0,0,.65)), url("/assets/campaigns/placeholder.jpg") center/cover no-repeat; border-bottom:1px solid var(--border); }
  .content{ padding:18px; }
  .kicker{ letter-spacing:.22em; text-transform:uppercase; font-weight:600; font-size:12px; color:rgba(255,255,255,.70); }
  h1{ margin:10px 0 8px; font-family:Georgia,serif; font-size:clamp(30px,4vw,46px); }
  .meta{ display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px; color:rgba(255,255,255,.72); font-size:12px; letter-spacing:.10em; text-transform:uppercase; }
  .pill{ border:1px solid rgba(255,255,255,.16); background:rgba(0,0,0,.22); padding:6px 8px; border-radius:999px; }
  .pill.gold{ border-color:rgba(185,144,84,.55); background:linear-gradient(135deg, rgba(185,144,84,.16), rgba(0,0,0,.14)); }
  .desc{ color:rgba(255,255,255,.78); line-height:1.8; white-space:pre-line; }
  .row{ display:flex; gap:14px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.10); color:rgba(255,255,255,.75); }
  .row strong{ color:rgba(255,255,255,.92); }
  .actions{ display:flex; gap:10px; margin-top:16px; }
  .btn{ flex:1; text-align:center; padding:10px 12px; border-radius:12px; text-decoration:none; border:1px solid rgba(255,255,255,.18); color:rgba(255,255,255,.90); background:rgba(0,0,0,.20); }
  .btn.primary{ border-color:rgba(185,144,84,.55); background:linear-gradient(135deg, rgba(185,144,84,.18), rgba(0,0,0,.12)); }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="brand" href="/">
      <img src="/assets/nav/Astral-Forge-nav.png" alt="Astral Forge" />
      <span class="brand-text">Astral Forge • Play</span>
    </a>
    <div class="nav-links">
      <a href="/campaigns/">Campaigns</a>
      <a href="/#private">Private Bookings</a>
      <a class="cta" href="https://astralforge.studio/membership/" target="_blank" rel="noopener">Join</a>
    </div>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="banner" id="banner"></div>
    <div class="content">
      <div class="kicker">Adventure</div>
      <h1 id="title">Loading…</h1>
      <div class="meta" id="meta"></div>
      <div class="desc" id="desc"></div>
      <div class="row" id="row"></div>
      <div class="actions">
        <a class="btn" href="/campaigns/">Back</a>
        <a class="btn primary" href="https://astralforge.studio/contact/" target="_blank" rel="noopener">Request Seat</a>
      </div>
    </div>
  </div>
</main>

<script>
  const API_LIST = "https://astralforge.studio/api/v1/campaigns";

  function slugFromPath(){
    // /campaigns/<slug>/  -> "<slug>"
    const parts = location.pathname.split("/").filter(Boolean);
    const i = parts.indexOf("campaigns");
    return (i >= 0 && parts[i+1]) ? parts[i+1] : "";
  }

  async function load(){
    const slug = slugFromPath();
    if (!slug){
      document.getElementById("title").textContent = "Missing campaign slug.";
      return;
    }

    const res = await fetch(API_LIST);
    if (!res.ok){
      document.getElementById("title").textContent = "Campaign not found.";
      return;
    }

    const data = await res.json();
    const rows = Array.isArray(data.campaigns) ? data.campaigns : [];
    const c = rows.find(x => x.slug === slug);

    if (!c){
      document.getElementById("title").textContent = "Campaign not found.";
      return;
    }

    document.title = `Astral Forge • ${c.title || c.slug}`;
    document.getElementById("title").textContent = c.title || c.slug;

    const seatsOpen = Number(c.seats_open ?? 0);
    const seatsTotal = Number(c.seats_total ?? 0);
    const mode = c.mode || (seatsOpen > 0 ? "open" : "full");

    const meta = document.getElementById("meta");
    meta.innerHTML = `
      <span class="pill">${c.system || "—"}</span>
      <span class="pill">${(c.day || "—")} • ${(c.time || "—")}</span>
      <span class="pill gold">${mode === "open" ? "Open Seats" : "Full / Waitlist"}</span>
    `;

    const desc = document.getElementById("desc");
    desc.textContent = c.data_json ? c.blurb || c.hook || "" : (c.blurb || c.hook || "");

    const row = document.getElementById("row");
    row.innerHTML = `
      <div><strong>Seats:</strong> ${seatsOpen}${seatsTotal ? `/${seatsTotal}` : ""}</div>
      <div><strong>Price:</strong> ${c.price || ""}</div>
    `;

    if (c.thumb){
      document.getElementById("banner").style.backgroundImage =
        `radial-gradient(circle at 25% 20%, rgba(255,255,255,.08), rgba(0,0,0,.65)), url("${c.thumb}")`;
    }
  }

  load().catch(err => {
    console.error(err);
    document.getElementById("title").textContent = "Error loading campaign.";
  });
</script>
</body>
</html>
